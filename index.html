<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #dbdbdb; --toolbar: #ffffff; --text: #333; --accent: #007bff; --stroke-color: #007bff; }
        body.dark-mode { --bg: #1e1e1e; --toolbar: #2d2d2d; --text: #eee; }
        body.dark-mode #viewer canvas:first-child { filter: invert(0.9) hue-rotate(180deg); }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .toolbar { background: var(--toolbar); padding: 8px 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #ccc; z-index: 1000; flex-wrap: wrap; }
        .tool-group { display: flex; background: rgba(0,0,0,0.05); border-radius: 8px; padding: 4px; gap: 4px; }
        
        button { border: none; background: transparent; color: var(--text); padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        button.active { background: var(--accent); color: white; }

        .sizer-container { display: flex; align-items: center; gap: 8px; padding: 0 10px; border-left: 1px solid #ccc; }
        #stroke-slider { cursor: pointer; accent-color: var(--stroke-color); width: 70px; }

        #viewer { flex: 1; overflow: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; } 
        .page-wrapper { position: relative; transform: scale(var(--zoom, 1)); transform-origin: top center; display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; }
        .page-body { position: relative; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .canvas-container { position: absolute !important; top: 0; left: 0; }
        
        #delete-btn { color: #dc3545; display: none; }
        .btn-danger { color: #dc3545; font-size: 0.9rem; font-weight: bold; }

        .zoom-controls { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1001; }
        .zoom-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--toolbar); color: var(--text); box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: none; cursor: pointer; }
        
        #loader { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
    </style>
</head>
<body>

<div id="loader"><p>Syncing Data...</p></div>

<div class="toolbar">
    <button onclick="document.getElementById('file-input').click()"><i class="fas fa-file-upload"></i></button>
    
    <div class="tool-group">
        <button class="tool-btn active" data-tool="select"><i class="fas fa-mouse-pointer"></i></button>
        <button class="tool-btn" data-tool="pen"><i class="fas fa-pen"></i></button>
        <button class="tool-btn" data-tool="highlighter"><i class="fas fa-highlighter"></i></button>
        <button class="tool-btn" data-tool="eraser"><i class="fas fa-eraser"></i></button>
    </div>

    <div class="tool-group">
        <button class="tool-btn" data-tool="rect"><i class="fas fa-vector-square"></i></button>
        <button class="tool-btn" data-tool="star"><i class="fas fa-star"></i></button>
        <button class="tool-btn" data-tool="text"><i class="fas fa-font"></i></button>
    </div>

    <div class="sizer-container">
        <input type="range" id="stroke-slider" min="2" max="50" value="5">
    </div>

    <input type="color" id="color-picker" value="#007bff">
    
    <button onclick="toggleDarkMode()" id="dark-toggle"><i class="fas fa-moon"></i></button>
    <button id="delete-btn" onclick="deleteSelection()"><i class="fas fa-trash-alt"></i></button>
    <button class="btn-danger" onclick="clearStorage()" title="Clear Data"><i class="fas fa-broom"></i></button>

    <button onclick="exportPDF()" style="margin-left: auto; background: #28a745; color: white; padding: 8px 15px; border-radius: 5px; font-weight: bold;">Download</button>
</div>

<div id="viewer" style="--zoom: 1;"></div>

<div class="zoom-controls">
    <button class="zoom-btn" onclick="applyZoom(0.1)"><i class="fas fa-plus"></i></button>
    <button class="zoom-btn" onclick="applyZoom(-0.1)"><i class="fas fa-minus"></i></button>
</div>

<input type="file" id="file-input" hidden accept="application/pdf">

<script>
    const { jsPDF } = window.jspdf;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc = null, canvases = [], currentTool = 'select', currentColor = '#007bff', currentWidth = 5, zoomLevel = 1.0, currentFileName = "", isShift = false;

    window.onkeydown = e => { if(e.key === 'Shift') isShift = true; if(e.key === 'Delete') deleteSelection(); };
    window.onkeyup = () => isShift = false;

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        document.querySelector('#dark-toggle i').className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
    }

    const saveState = () => {
        if (!currentFileName) return;
        localStorage.setItem(`pdf_edit_${currentFileName}`, JSON.stringify(canvases.map(c => c.toJSON())));
    };

    const loadState = () => {
        const saved = localStorage.getItem(`pdf_edit_${currentFileName}`);
        if (!saved) return;
        const data = JSON.parse(saved);
        canvases.forEach((c, i) => { if (data[i]) c.loadFromJSON(data[i], () => { c.setZoom(2.0); c.renderAll(); }); });
    };

    function clearStorage() { if(confirm("Wipe edits?")) { localStorage.removeItem(`pdf_edit_${currentFileName}`); location.reload(); } }

    const updateBrushStyle = () => {
        document.documentElement.style.setProperty('--stroke-color', currentColor);
        canvases.forEach(c => {
            if (c.freeDrawingBrush) {
                c.freeDrawingBrush.color = (currentTool === 'highlighter') ? currentColor + '70' : currentColor;
                c.freeDrawingBrush.width = (currentTool === 'highlighter') ? currentWidth * 4 : currentWidth;
            }
        });
    };

    document.getElementById('color-picker').oninput = (e) => {
        currentColor = e.target.value;
        updateBrushStyle();
        canvases.forEach(c => {
            c.getActiveObjects().forEach(obj => {
                obj.type.includes('text') ? obj.set('fill', currentColor) : obj.set('stroke', currentColor);
            });
            c.requestRenderAll();
        });
        saveState();
    };

    document.getElementById('stroke-slider').oninput = (e) => {
        currentWidth = parseInt(e.target.value);
        updateBrushStyle();
    };

    document.getElementById('file-input').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        currentFileName = file.name;
        document.getElementById('loader').style.display = 'flex';
        const reader = new FileReader();
        reader.onload = async function() {
            pdfDoc = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
            await initViewer();
            loadState();
            document.getElementById('loader').style.display = 'none';
        };
        reader.readAsArrayBuffer(file);
    };

    async function initViewer() {
        const viewer = document.getElementById('viewer');
        viewer.innerHTML = ''; canvases = [];
        for (let i = 1; i <= pdfDoc.numPages; i++) {
            const page = await pdfDoc.getPage(i);
            const vp = page.getViewport({ scale: 2.0 });
            const wrap = document.createElement('div'); wrap.className = 'page-wrapper';
            const body = document.createElement('div'); body.className = 'page-body';
            body.style.width = (vp.width / 2) + 'px'; body.style.height = (vp.height / 2) + 'px';
            const bg = document.createElement('canvas'); bg.width = vp.width; bg.height = vp.height;
            bg.style.width = "100%"; bg.style.height = "100%";
            const fg = document.createElement('canvas'); fg.id = `fg-${i}`;
            body.append(bg, fg); wrap.append(body); viewer.appendChild(wrap);
            await page.render({ canvasContext: bg.getContext('2d'), viewport: vp }).promise;
            const fCanvas = new fabric.Canvas(fg.id, { width: vp.width, height: vp.height });
            fCanvas.setZoom(2.0);
            setupFabric(fCanvas); canvases.push(fCanvas);
        }
        refreshTools();
    }

    function getStar(s, o, r) {
        let rot = Math.PI/2*3, step = Math.PI/s, pts = [];
        for(let i=0; i<s; i++){
            pts.push({x: Math.cos(rot)*o, y: Math.sin(rot)*o}); rot+=step;
            pts.push({x: Math.cos(rot)*r, y: Math.sin(rot)*r}); rot+=step;
        }
        return pts;
    }

    function setupFabric(fCanvas) {
        fCanvas.on('selection:created', () => { if(currentTool === 'select') document.getElementById('delete-btn').style.display = 'block'; });
        fCanvas.on('selection:cleared', () => document.getElementById('delete-btn').style.display = 'none');
        fCanvas.on('object:modified', saveState);
        fCanvas.on('object:added', saveState);
        fCanvas.on('object:removed', saveState);

        // Restored Shift-to-Straight-Line
        fCanvas.on('path:created', (opt) => {
            if (isShift) {
                const p = opt.path.path;
                if (p.length > 1) opt.path.set({ path: [['M', p[0][1], p[0][2]], ['L', p[p.length-1][1], p[p.length-1][2]]] });
            }
            saveState();
        });

        let drawing = false, obj, sx, sy;
        fCanvas.on('mouse:down', (o) => {
            if (currentTool === 'select') return;
            if (currentTool === 'eraser') { if (o.target) fCanvas.remove(o.target); return; }
            let ptr = fCanvas.getPointer(o.e); sx = ptr.x; sy = ptr.y;
            if (currentTool === 'text') {
                const text = new fabric.IText('Text...', { left: sx, top: sy, fontSize: 24, fill: currentColor });
                fCanvas.add(text); fCanvas.setActiveObject(text);
                return;
            }
            drawing = true;
            if (currentTool === 'rect') obj = new fabric.Rect({ left: sx, top: sy, width: 1, height: 1, fill: 'transparent', stroke: currentColor, strokeWidth: currentWidth });
            else if (currentTool === 'star') obj = new fabric.Polygon(getStar(5, 50, 25), { left: sx, top: sy, fill: 'transparent', stroke: currentColor, strokeWidth: currentWidth, originX: 'center', originY: 'center' });
            if(obj) fCanvas.add(obj);
        });
        fCanvas.on('mouse:move', (o) => {
            if (!drawing) return;
            let p = fCanvas.getPointer(o.e);
            if (currentTool === 'rect') obj.set({ width: Math.abs(sx - p.x), height: Math.abs(sy - p.y), left: Math.min(sx, p.x), top: Math.min(sy, p.y) });
            else if (currentTool === 'star') {
                let d = Math.sqrt(Math.pow(sx-p.x,2)+Math.pow(sy-p.y,2));
                obj.set({ scaleX: d/50, scaleY: d/50 });
            }
            fCanvas.renderAll();
        });
        fCanvas.on('mouse:up', () => drawing = false);
    }

    function applyZoom(v) { zoomLevel += v; document.getElementById('viewer').style.setProperty('--zoom', zoomLevel); }

    function refreshTools() {
        canvases.forEach(c => {
            c.isDrawingMode = (currentTool === 'pen' || currentTool === 'highlighter');
            if (c.isDrawingMode) {
                c.freeDrawingBrush = new fabric.PencilBrush(c);
                updateBrushStyle();
            }
            c.selection = (currentTool === 'select');
            c.forEachObject(o => { o.selectable = (currentTool === 'select'); o.hasControls = o.selectable; });
            c.requestRenderAll();
        });
    }

    function deleteSelection() {
        canvases.forEach(c => {
            const act = c.getActiveObjects();
            if (act.length > 0) { c.remove(...act); c.discardActiveObject(); }
        });
    }

    document.querySelectorAll('.tool-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTool = btn.dataset.tool;
            refreshTools();
        };
    });

    async function exportPDF() {
        document.getElementById('loader').style.display = 'flex';
        const doc = new jsPDF({ unit: 'px', format: [canvases[0].width, canvases[0].height], hotfixes: ["px_scaling"] });
        for (let i = 0; i < canvases.length; i++) {
            const c = canvases[i];
            if (i > 0) doc.addPage([c.width, c.height], c.width > c.height ? 'l' : 'p');
            const bg = document.querySelectorAll('.page-body canvas:first-child')[i];
            doc.addImage(bg.toDataURL('image/jpeg', 1.0), 'JPEG', 0, 0, c.width, c.height);
            doc.addImage(c.toDataURL({ format: 'png' }), 'PNG', 0, 0, c.width, c.height);
        }
        doc.save("edited_restored.pdf");
        document.getElementById('loader').style.display = 'none';
    }
</script>
</body>
</html>
