<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Handwritten Mind Map Pro (Image Export)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap');

        :root {
            --bg: #f1f5f9;
            --node-bg: #ffffff;
            --accent: #2563eb;
            --text: #1e293b;
            --line: #94a3b8;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            touch-action: none;
        }

        #viewport {
            width: 100vw; height: 100vh;
            overflow: hidden; position: relative; cursor: grab;
        }

        #canvas {
            position: absolute; width: 5000px; height: 5000px;
            background-image: radial-gradient(#e2e8f0 1.5px, transparent 1.5px);
            background-size: 40px 40px; transform-origin: 0 0;
        }

        #svg-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .node {
            position: absolute; min-width: 140px; padding: 10px;
            background: var(--node-bg); border: 2px solid #64748b;
            border-radius: 8px; cursor: move; z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); touch-action: none;
        }

        .node.selected { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .node input {
            border: none; outline: none; background: transparent;
            text-align: center; width: 100%;
            font-family: 'Indie Flower', cursive;
            font-size: 18px; font-weight: 600;
            color: var(--text);
        }

        #gui {
            position: fixed; top: 15px; left: 15px; z-index: 100;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0; width: 220px;
        }

        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        button {
            padding: 10px; cursor: pointer;
            background: var(--accent); color: white;
            border: none; border-radius: 6px; font-weight: 600;
        }
        button.secondary { background: #64748b; }
        button.danger { background: #ef4444; }

        /* PREVIEW MODAL STYLES */
        #preview-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 200;
            justify-content: center; align-items: center; flex-direction: column;
            gap: 20px;
        }
        #preview-image-container {
            max-width: 90%; max-height: 80%; background: white;
            padding: 20px; border-radius: 10px; overflow: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        #preview-image-container img { max-width: 100%; height: auto; display: block; }
        #modal-buttons { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="gui">
        <div style="font-size: 11px; color: #64748b;"><b>Tab</b>: Add Child | <b>Enter</b>: Add Sibling</div>
        <div class="btn-group">
            <button onclick="previewMapImage()">Preview & Download Image</button>
            <button class="secondary" onclick="saveToLocal()">Save Progress</button>
            <button class="danger" onclick="clearMap()">Reset</button>
        </div>
    </div>

    <div id="viewport">
        <div id="canvas">
            <svg id="svg-canvas"></svg>
            <div id="nodes-container"></div>
        </div>
    </div>

    <div id="preview-modal">
        <div id="preview-image-container">
            <img id="map-preview-img" src="" alt="Mind Map Preview">
        </div>
        <div id="modal-buttons">
            <button class="secondary" onclick="closePreview()">Close</button>
            <button onclick="downloadMapImage()">Download High-Res PNG</button>
        </div>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    const canvas = document.getElementById('canvas');
    const viewport = document.getElementById('viewport');
    const nodesContainer = document.getElementById('nodes-container');
    const svg = document.getElementById('svg-canvas');
    const previewModal = document.getElementById('preview-modal');
    const previewImg = document.getElementById('map-preview-img');

    let data = JSON.parse(localStorage.getItem('mindmap_flower_vfinal')) || {
        id: 'root', text: 'Central Idea', x: 2400, y: 2400, children: []
    };
    
    let selectedId = 'root';
    let draggedNode = null;
    let isPanning = false;
    let offset = { x: 0, y: 0 };
    let panStart = { x: 0, y: 0, sL: 0, sT: 0 };

    function render() {
        nodesContainer.innerHTML = '';
        svg.innerHTML = '';
        drawTree(data);
    }

    function drawTree(node, parent = null) {
        const div = document.createElement('div');
        div.className = `node ${selectedId === node.id ? 'selected' : ''}`;
        div.style.left = node.x + 'px';
        div.style.top = node.y + 'px';
        
        const input = document.createElement('input');
        input.value = node.text;
        input.onpointerdown = (e) => e.stopPropagation();
        input.oninput = (e) => { node.text = e.target.value; };
        input.onfocus = () => { selectedId = node.id; };

        // keydown fix: stopPropagation prevents double generation
        input.onkeydown = (e) => {
            if (e.key === 'Enter' || e.key === 'Tab') {
                e.preventDefault();
                e.stopPropagation(); // <-- FIX: Stops event bubbling
                input.blur();
                handleKeydown(e); // Trigger the logic manually once
            }
        };
        div.appendChild(input);

        div.onpointerdown = (e) => {
            if (e.target === input) return;
            e.preventDefault(); e.stopPropagation();
            selectedId = node.id; draggedNode = node;
            offset.x = e.pageX - node.x; offset.y = e.pageY - node.y;
            render();
        };

        nodesContainer.appendChild(div);

        if (parent) {
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            const startX = parent.x + 70; const startY = parent.y + 20;
            const endX = node.x + 70; const endY = node.y + 20;
            const cp1x = startX + (endX - startX) / 2;
            path.setAttribute('d', `M ${startX} ${startY} C ${cp1x} ${startY}, ${cp1x} ${endY}, ${endX} ${endY}`);
            path.setAttribute('stroke', '#94a3b8'); path.setAttribute('fill', 'transparent'); path.setAttribute('stroke-width', '2');
            svg.appendChild(path);
        }
        node.children.forEach(child => drawTree(child, node));
    }

    // Move Handling
    window.onpointermove = (e) => {
        if (draggedNode) {
            draggedNode.x = e.pageX - offset.x; draggedNode.y = e.pageY - offset.y;
            render();
        } else if (isPanning) {
            viewport.scrollLeft = panStart.sL - (e.pageX - panStart.x);
            viewport.scrollTop = panStart.sT - (e.pageY - panStart.y);
        }
    };
    window.onpointerup = () => { draggedNode = null; isPanning = false; viewport.style.cursor = 'grab'; };

    // Canvas Panning
    viewport.onpointerdown = (e) => {
        if (e.target !== viewport && e.target !== canvas) return;
        isPanning = true; viewport.style.cursor = 'grabbing';
        panStart.x = e.pageX; panStart.y = e.pageY;
        panStart.sL = viewport.scrollLeft; panStart.sT = viewport.scrollTop;
    };

    function handleKeydown(e) {
        const activeNode = findById(data, selectedId);
        if (!activeNode) return;
        if (e.key === 'Tab') {
            e.preventDefault();
            const newNode = { id: 'n'+Date.now(), text: 'New Child', x: activeNode.x + 220, y: activeNode.y, children: [] };
            activeNode.children.push(newNode);
            selectedId = newNode.id; render();
        } else if (e.key === 'Enter') {
            e.preventDefault();
            const parent = findParent(data, selectedId);
            const newNode = { id: 'n'+Date.now(), text: 'New Node', x: activeNode.x + (parent ? 0 : 220), y: activeNode.y + (parent ? 80 : 0), children: [] };
            if (parent) parent.children.push(newNode); else activeNode.children.push(newNode);
            selectedId = newNode.id; render();
        } else if ((e.key === 'Delete' || e.key === 'Backspace') && document.activeElement.tagName !== 'INPUT') {
            if (selectedId === 'root') return;
            const parent = findParent(data, selectedId);
            parent.children = parent.children.filter(c => c.id !== selectedId);
            selectedId = parent.id; render();
        }
    }
    window.onkeydown = handleKeydown;

    // Helpers
    function findById(root, id) {
        if (root.id === id) return root;
        for (let c of root.children) { let res = findById(c, id); if (res) return res; }
    }
    function findParent(root, id) {
        for (let c of root.children) { if (c.id === id) return root; let res = findParent(c, id); if (res) return res; }
    }

    // --- PREVIEW & EXPORT LOGIC ---
    let finalImageDataUrl = '';

    function generateImage() {
        const nodes = document.querySelectorAll('.node');
        if (!nodes.length) return Promise.reject("No nodes");

        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        nodes.forEach(n => {
            const x = parseFloat(n.style.left); const y = parseFloat(n.style.top);
            minX = Math.min(minX, x); minY = Math.min(minY, y);
            maxX = Math.max(maxX, x + n.offsetWidth); maxY = Math.max(maxY, y + n.offsetHeight);
        });

        const padding = 50;
        return html2canvas(canvas, {
            x: minX - padding, y: minY - padding,
            width: (maxX - minX) + (padding * 2), height: (maxY - minY) + (padding * 2),
            scale: 2, backgroundColor: '#f1f5f9', logging: false
        }).then(capturedCanvas => {
            return capturedCanvas.toDataURL("image/png");
        });
    }

    function previewMapImage() {
        const currentSelection = selectedId;
        selectedId = null; // Clean export
        render();
        generateImage().then(dataUrl => {
            finalImageDataUrl = dataUrl;
            previewImg.src = dataUrl;
            previewModal.style.display = 'flex';
            selectedId = currentSelection; render();
        });
    }

    function downloadMapImage() {
        if (!finalImageDataUrl) return;
        const link = document.createElement('a');
        link.href = finalImageDataUrl;
        link.download = `mindmap-${Date.now()}.png`;
        link.click();
        closePreview();
    }

    function closePreview() { previewModal.style.display = 'none'; finalImageDataUrl = ''; }

    function saveToLocal() { localStorage.setItem('mindmap_flower_vfinal', JSON.stringify(data)); alert("Saved!"); }
    function clearMap() { if(confirm("Reset?")) { localStorage.removeItem('mindmap_flower_vfinal'); location.reload(); } }

    render();
    viewport.scrollLeft = 2400 - (window.innerWidth / 2);
    viewport.scrollTop = 2400 - (window.innerHeight / 2);
</script>
</body>
</html>
